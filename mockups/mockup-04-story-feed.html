const typeIcons = {
  bill: { icon: '📋', label: '법안 발의', color: 'bg-blue-100 text-blue-700' },
  vote: { icon: '🗳️', label: '표결', color: 'bg-purple-100 text-purple-700' },
  speech: { icon: '🎙️', label: '발언', color: 'bg-amber-100 text-amber-700' },
  committee: { icon: '🏛️', label: '위원회', color: 'bg-green-100 text-green-700' }
};

let currentFilter = 'all';
let visibleCount = 10;

function filterFeed(type) {
  currentFilter = type;
  visibleCount = 10;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    if (btn.dataset.filter === type) {
      btn.className = 'filter-btn active px-4 py-2 text-sm rounded-full bg-gray-900 text-white whitespace-nowrap';
    } else {
      btn.className = 'filter-btn px-4 py-2 text-sm rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200 whitespace-nowrap';
    }
  });
  renderFeed();
}

function loadMore() {
  visibleCount += 10;
  renderFeed();
}

function getRelativeDate(dateStr) {
  const date = new Date(dateStr);
  const now = new Date('2026-03-26');
  const diffDays = Math.floor((now - date) / 86400000);
  if (diffDays === 0) return '오늘';
  if (diffDays === 1) return '어제';
  if (diffDays < 7) return `${diffDays}일 전`;
  return dateStr;
}

function renderFeed() {
  const feed = document.getElementById('feed');
  const filtered = currentFilter === 'all' ? feedData : feedData.filter(f => f.type === currentFilter);
  const visible = filtered.slice(0, visibleCount);

  let lastDate = '';
  feed.innerHTML = visible.map((item, idx) => {
    const ti = typeIcons[item.type];
    const partyColor = item.legislator.party === '더불어민주당' ? '#1A56DB' : '#E5243B';
    const partyBg = item.legislator.party === '더불어민주당' ? 'bg-blue-50 text-blue-700' : 'bg-red-50 text-red-700';

    let dateHeader = '';
    if (item.date !== lastDate) {
      lastDate = item.date;
      dateHeader = `<div class="py-3 flex items-center gap-3"><div class="h-px flex-1 bg-gray-200"></div><span class="text-xs text-gray-400 font-medium">${getRelativeDate(item.date)} &middot; ${item.date}</span><div class="h-px flex-1 bg-gray-200"></div></div>`;
    }

    return `
      ${dateHeader}
      <div class="feed-item relative pl-12 pb-6">
        <div class="timeline-line"></div>
        <div class="absolute left-0 top-0 w-10 h-10 rounded-full flex items-center justify-center text-lg z-10" style="background: ${partyColor}22">
          ${ti.icon}
        </div>
        <div class="bg-white rounded-xl border border-gray-200 p-5 hover:shadow-sm transition-shadow">
          <div class="flex items-start justify-between mb-3 flex-wrap gap-2">
            <div class="flex items-center gap-2">
              <span class="font-bold text-gray-900">${item.legislator.name}</span>
              <span class="text-xs px-2 py-0.5 rounded-full ${partyBg}">${item.legislator.party}</span>
              <span class="text-xs text-gray-400">${item.legislator.district}</span>
            </div>
            <div class="flex items-center gap-2">
              <span class="text-xs px-2 py-0.5 rounded-full ${ti.color}">${ti.label}</span>
              <span class="text-xs text-gray-400">${item.time}</span>
            </div>
          </div>
          <p class="text-gray-700 mb-2">${item.content}</p>
          <div class="bg-gray-50 rounded-lg p-3">
            <p class="text-sm text-gray-600">${item.detail}</p>
          </div>
          ${item.vote ? `<div class="mt-2 inline-flex items-center gap-1 text-sm ${item.vote === '찬성' ? 'text-blue-600' : 'text-red-600'}"><span>${item.vote === '찬성' ? '👍' : '👎'}</span> ${item.vote}</div>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

renderFeed();
