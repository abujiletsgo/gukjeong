<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>국회의원 - 본회의장</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
body { font-family: 'Pretendard', sans-serif; }
.seat { width: 10px; height: 10px; border-radius: 50%; cursor: pointer; transition: all 0.15s; position: absolute; }
.seat:hover { transform: scale(2.5); z-index: 10; box-shadow: 0 0 0 3px rgba(0,0,0,0.2); }
.seat.active { transform: scale(2.5); z-index: 10; box-shadow: 0 0 0 3px rgba(0,0,0,0.3); }
.chamber { position: relative; width: 100%; max-width: 700px; height: 380px; margin: 0 auto; }
.tooltip-card { transition: all 0.2s; }
@media (max-width: 640px) { .chamber { height: 280px; } .seat { width: 7px; height: 7px; } }
</style>
</head>
<body class="bg-gray-950 min-h-screen text-white">

<header class="border-b border-gray-800">
  <div class="max-w-5xl mx-auto px-4 py-5 flex items-center justify-between flex-wrap gap-3">
    <div>
      <h1 class="text-xl font-bold">제22대 국회 본회의장</h1>
      <p class="text-sm text-gray-400">300석 좌석 배치도</p>
    </div>
    <div class="flex items-center gap-4 text-sm">
      <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full" style="background:#1A56DB"></span> 더불어민주당 <span class="text-gray-500">170석</span></span>
      <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full" style="background:#E5243B"></span> 국민의힘 <span class="text-gray-500">108석</span></span>
      <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-gray-500"></span> 기타 <span class="text-gray-500">22석</span></span>
    </div>
  </div>
</header>

<main class="max-w-5xl mx-auto px-4 py-8">

  <!-- Chamber -->
  <div class="bg-gray-900 rounded-2xl p-6 mb-6">
    <div class="chamber" id="chamber">
      <!-- Podium -->
      <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-24 h-10 bg-gray-700 rounded-t-lg flex items-center justify-center text-xs text-gray-400">
        의장석
      </div>
    </div>
  </div>

  <!-- Detail Panel -->
  <div id="detail-panel" class="bg-gray-900 rounded-2xl p-6 hidden tooltip-card">
    <div id="detail-content"></div>
  </div>

  <!-- Stats -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-6">
    <div class="bg-gray-900 rounded-xl p-5 text-center">
      <div class="text-3xl font-bold">300</div>
      <div class="text-sm text-gray-400 mt-1">전체 의석</div>
    </div>
    <div class="bg-gray-900 rounded-xl p-5 text-center">
      <div class="text-3xl font-bold text-green-400">283</div>
      <div class="text-sm text-gray-400 mt-1">재적 의원</div>
    </div>
    <div class="bg-gray-900 rounded-xl p-5 text-center">
      <div class="text-3xl font-bold text-yellow-400">12</div>
      <div class="text-sm text-gray-400 mt-1">공석</div>
    </div>
    <div class="bg-gray-900 rounded-xl p-5 text-center">
      <div class="text-3xl font-bold text-blue-400">5</div>
      <div class="text-sm text-gray-400 mt-1">교섭단체</div>
    </div>
  </div>

</main>

<script>
const knownLegislators = [
  { name: "윤준병", party: "더불어민주당", district: "전북 정읍·고창", bills: 31, participation: 91, education: "서울대 수의학과, 서울대 보건대학원 석사", career: "농림축산식품부 차관, 수의사",
    recentBills: [{ name: "농업인안전보험법", summary: "농업인의 산재 보험 가입을 국가가 지원하는 법" }] },
  { name: "강대식", party: "국민의힘", district: "대구 동구·군위", bills: 18, participation: 87, education: "영남대 정치외교학과, 영남대 대학원 박사", career: "영남대 교수, 대구시 정무부시장",
    recentBills: [{ name: "지방자치법 개정안", summary: "지방의회의 자치입법권을 강화하여 지역 맞춤 정책을 가능하게 하는 법" }] },
  { name: "김승원", party: "더불어민주당", district: "경기 수원시을", bills: 45, participation: 96, education: "서울대 법학과, 사법시험 합격", career: "변호사, 수원시 법률자문위원",
    recentBills: [{ name: "형사소송법 개정안", summary: "피의자의 변호인 접견권을 24시간 보장하는 법" }] },
  { name: "주진우", party: "더불어민주당", district: "서울 영등포구을", bills: 28, participation: 89, education: "고려대 법학과, 고려대 법학대학원", career: "변호사, 시민단체 활동가",
    recentBills: [{ name: "공익신고자 보호법", summary: "내부 비리를 신고한 사람을 보복으로부터 보호하는 법" }] },
  { name: "추경호", party: "국민의힘", district: "대구 달성", bills: 23, participation: 94, education: "서울대 경제학과, 미국 위스콘신대 경제학 박사", career: "기획재정부 장관, 국무조정실장",
    recentBills: [{ name: "조세특례제한법 개정안", summary: "중소기업 투자 세액공제 기한을 2028년까지 연장하는 법" }] },
  { name: "김현정", party: "더불어민주당", district: "비례대표", bills: 33, participation: 93, education: "이화여대 정치외교학과", career: "KBS 앵커, 시사프로그램 진행자",
    recentBills: [{ name: "방송법 개정안", summary: "공영방송의 독립성을 보장하기 위해 이사회 구성을 개편하는 법" }] },
  { name: "신원식", party: "국민의힘", district: "비례대표", bills: 15, participation: 85, education: "육군사관학교, 국방대학원", career: "국방부 장관, 합참 작전본부장",
    recentBills: [{ name: "군인복지법 개정안", summary: "병사 월급을 200만원으로 단계적으로 인상하는 법" }] },
  { name: "서영석", party: "더불어민주당", district: "경기 부천시갑", bills: 38, participation: 95, education: "연세대 의학과, 의학박사", career: "의사, 부천시의사회장",
    recentBills: [{ name: "국민건강보험법 개정안", summary: "비급여 진료 항목을 단계적으로 급여화하는 법" }] },
  { name: "이태규", party: "국민의힘", district: "부산 사하구을", bills: 27, participation: 88, education: "부산대 교육학과, 부산대 교육대학원", career: "교원, 부산시교육청 장학사",
    recentBills: [{ name: "교육기본법 개정안", summary: "학생의 디지털 리터러시 교육을 의무화하는 법" }] },
  { name: "박충권", party: "국민의힘", district: "대전 유성구갑", bills: 22, participation: 90, education: "KAIST 전산학과, MIT 컴퓨터과학 석사", career: "IT 기업 대표, 과기부 자문위원",
    recentBills: [{ name: "인공지능산업법", summary: "AI 개발 및 활용에 대한 기본 원칙과 지원 체계를 마련하는 법" }] }
];

const surnames = ["김","이","박","최","정","강","조","윤","장","임","한","오","서","신","권","황","안","송","류","홍"];
const givenNames = ["민수","지현","서준","하은","도윤","수빈","예준","지우","시우","하율","현우","지민","소율","유준","채원","민지","준서","수아","지호","은서"];

function generateAllSeats() {
  const seats = [];
  // Add known legislators
  knownLegislators.forEach(l => seats.push({ ...l, known: true }));

  // Generate remaining 290 seats
  for (let i = 0; i < 278; i++) {
    const party = i < 160 ? "더불어민주당" : i < 258 ? "국민의힘" : "기타";
    const name = surnames[i % 20] + givenNames[Math.floor(i / 20) % 20];
    seats.push({
      name, party, known: false,
      district: "지역구",
      bills: Math.floor(Math.random() * 40) + 5,
      participation: Math.floor(Math.random() * 20) + 75
    });
  }

  // Empty seats
  for (let i = 0; i < 12; i++) {
    seats.push({ empty: true });
  }

  return seats;
}

function getPartyColor(party) {
  if (party === '더불어민주당') return '#1A56DB';
  if (party === '국민의힘') return '#E5243B';
  return '#6B7280';
}

function renderChamber() {
  const chamber = document.getElementById('chamber');
  const seats = generateAllSeats();
  const width = chamber.offsetWidth;
  const height = chamber.offsetHeight;
  const cx = width / 2;
  const cy = height - 30;

  const rows = 12;
  const seatsPerRow = [18, 20, 22, 24, 26, 28, 28, 28, 28, 26, 26, 26];
  let seatIndex = 0;

  for (let r = 0; r < rows; r++) {
    const count = seatsPerRow[r];
    const radius = 80 + r * 24;
    const startAngle = Math.PI * 0.15;
    const endAngle = Math.PI * 0.85;

    for (let s = 0; s < count && seatIndex < seats.length; s++) {
      const angle = startAngle + (endAngle - startAngle) * (s / (count - 1));
      const x = cx - Math.cos(angle) * radius;
      const y = cy - Math.sin(angle) * radius;

      const seat = seats[seatIndex];
      const el = document.createElement('div');
      el.className = 'seat';
      el.style.left = x + 'px';
      el.style.top = y + 'px';

      if (seat.empty) {
        el.style.background = '#374151';
        el.style.opacity = '0.3';
        el.title = '공석';
      } else {
        el.style.background = getPartyColor(seat.party);
        el.title = `${seat.name} (${seat.party})`;
        el.onclick = () => showSeatDetail(seat);
      }

      chamber.appendChild(el);
      seatIndex++;
    }
  }
}

function showSeatDetail(seat) {
  const panel = document.getElementById('detail-panel');
  const content = document.getElementById('detail-content');
  panel.classList.remove('hidden');

  const partyColor = getPartyColor(seat.party);
  const partyBg = seat.party === '더불어민주당' ? 'bg-blue-900/30 text-blue-300' : seat.party === '국민의힘' ? 'bg-red-900/30 text-red-300' : 'bg-gray-700 text-gray-300';

  content.innerHTML = `
    <div class="flex items-start gap-5 flex-wrap">
      <div class="w-16 h-16 rounded-full flex items-center justify-center text-2xl font-bold text-white" style="background: ${partyColor}">
        ${seat.name[0]}
      </div>
      <div class="flex-1 min-w-[200px]">
        <div class="flex items-center gap-2 mb-1">
          <h3 class="text-xl font-bold">${seat.name} 의원</h3>
          <span class="text-xs px-2 py-0.5 rounded-full ${partyBg}">${seat.party}</span>
        </div>
        <div class="text-sm text-gray-400 mb-3">${seat.district}</div>
        ${seat.known ? `
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">
            <div class="bg-gray-800 rounded-lg p-3">
              <div class="text-xs text-gray-500 mb-1">학력</div>
              <div class="text-sm">${seat.education}</div>
            </div>
            <div class="bg-gray-800 rounded-lg p-3">
              <div class="text-xs text-gray-500 mb-1">경력</div>
              <div class="text-sm">${seat.career}</div>
            </div>
          </div>
        ` : ''}
        <div class="flex gap-6 mb-4">
          <div>
            <div class="text-2xl font-bold">${seat.bills}</div>
            <div class="text-xs text-gray-500">발의 법안</div>
          </div>
          <div>
            <div class="text-2xl font-bold">${seat.participation}%</div>
            <div class="text-xs text-gray-500">본회의 출석률</div>
          </div>
        </div>
        ${seat.known && seat.recentBills ? `
          <div>
            <div class="text-xs text-gray-500 mb-2">대표 발의 법안</div>
            ${seat.recentBills.map(b => `
              <div class="border-l-2 pl-3 py-1 mb-2" style="border-color: ${partyColor}">
                <div class="text-sm font-medium">${b.name}</div>
                <div class="text-xs text-gray-400">${b.summary}</div>
              </div>
            `).join('')}
          </div>
        ` : ''}
      </div>
    </div>
  `;

  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

renderChamber();
window.addEventListener('resize', () => {
  const chamber = document.getElementById('chamber');
  const seats = chamber.querySelectorAll('.seat');
  seats.forEach(s => s.remove());
  renderChamber();
});
</script>
</body>
</html>
