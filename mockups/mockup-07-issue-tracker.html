  <!-- Issue Detail (hidden) -->

      전체 이슈로 돌아가기

function statusBadge(status) {
  const colors = {
    '본회의 가결': 'bg-green-100 text-green-700',
    '본회의 상정 예정': 'bg-blue-100 text-blue-700',
    '소위 심사 중': 'bg-amber-100 text-amber-700',
    '소위 회부': 'bg-amber-50 text-amber-600',
    '위원회 심사 중': 'bg-gray-100 text-gray-600',
    '위원회 상정': 'bg-gray-50 text-gray-500'
  };
  return `<span class="text-xs px-2 py-0.5 rounded-full ${colors[status] || 'bg-gray-100 text-gray-500'}">${status}</span>`;
}

function renderIssues() {
  const grid = document.getElementById('issue-grid');
  grid.innerHTML = issues.map((issue, idx) => `
    <div class="issue-card bg-white rounded-xl border border-gray-200 p-6 cursor-pointer hover:shadow-md" onclick="showDetail(${idx})">
      <div class="flex items-start justify-between mb-3">
        <span class="text-3xl">${issue.icon}</span>
        <div class="w-3 h-3 rounded-full" style="background:${issue.color}"></div>
      </div>
      <h3 class="text-lg font-bold text-gray-900 mb-1">${issue.name}</h3>
      <p class="text-sm text-gray-500 mb-4">${issue.desc}</p>
      <div class="flex gap-4 text-sm">
        <div>
          <span class="font-bold text-gray-900">${issue.billCount}</span>
          <span class="text-gray-400">건 법안</span>
        </div>
        <div>
          <span class="font-bold text-gray-900">${issue.activeLegislators}</span>
          <span class="text-gray-400">명 참여</span>
        </div>
      </div>
      <div class="mt-4 flex -space-x-2">
        ${issue.legislators.slice(0, 4).map(l => `
          <div class="w-8 h-8 rounded-full border-2 border-white flex items-center justify-center text-white text-xs font-bold" style="background:${l.party === '더불어민주당' ? '#1A56DB' : '#E5243B'}">${l.name[0]}</div>
        `).join('')}
        ${issue.legislators.length > 4 ? `<div class="w-8 h-8 rounded-full border-2 border-white bg-gray-200 flex items-center justify-center text-xs text-gray-500">+${issue.legislators.length - 4}</div>` : ''}
      </div>
    </div>
  `).join('');
}

function showIssues() {
  document.getElementById('view-issues').classList.remove('hidden');
  document.getElementById('view-detail').classList.add('hidden');
}

function showDetail(idx) {
  const issue = issues[idx];
  document.getElementById('view-issues').classList.add('hidden');
  document.getElementById('view-detail').classList.remove('hidden');

  const content = document.getElementById('detail-content');
  content.innerHTML = `
    <div class="mb-8">
      <div class="flex items-center gap-3 mb-2">
        <span class="text-4xl">${issue.icon}</span>
        <div>
          <h2 class="text-2xl font-bold text-gray-900">${issue.name}</h2>
          <p class="text-gray-500">${issue.desc}</p>
        </div>
      </div>
      <div class="flex gap-6 mt-4">
        <div class="bg-white rounded-lg border border-gray-200 px-5 py-3 text-center">
          <div class="text-2xl font-bold text-gray-900">${issue.billCount}</div>
          <div class="text-sm text-gray-500">관련 법안</div>
        </div>
        <div class="bg-white rounded-lg border border-gray-200 px-5 py-3 text-center">
          <div class="text-2xl font-bold text-gray-900">${issue.activeLegislators}</div>
          <div class="text-sm text-gray-500">참여 의원</div>
        </div>
      </div>
    </div>

    <!-- Bills -->
    <div class="mb-8">
      <h3 class="text-lg font-bold text-gray-900 mb-4">관련 법안</h3>
      <div class="space-y-3">
        ${issue.bills.map(b => `
          <div class="bg-white rounded-xl border border-gray-200 p-5">
            <div class="flex items-start justify-between gap-3 flex-wrap">
              <div class="flex-1">
                <div class="font-semibold text-gray-900 mb-1">${b.name}</div>
                <div class="text-sm text-gray-500">${b.summary}</div>
              </div>
              ${statusBadge(b.status)}
            </div>
          </div>
        `).join('')}
      </div>
    </div>

    <!-- Legislators -->
    <div>
      <h3 class="text-lg font-bold text-gray-900 mb-4">이 이슈를 다루는 의원</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        ${issue.legislators.map(l => {
          const pc = l.party === '더불어민주당' ? '#1A56DB' : '#E5243B';
          const pbg = l.party === '더불어민주당' ? 'bg-blue-50 text-blue-700' : 'bg-red-50 text-red-700';
          return `
            <div class="bg-white rounded-xl border border-gray-200 p-5">
              <div class="flex items-center gap-4 mb-3">
                <div class="w-12 h-12 rounded-full flex items-center justify-center text-white text-lg font-bold" style="background:${pc}">${l.name[0]}</div>
                <div>
                  <div class="flex items-center gap-2">
                    <span class="font-bold text-gray-900">${l.name}</span>
                    <span class="text-xs px-2 py-0.5 rounded-full ${pbg}">${l.party}</span>
                  </div>
                  <div class="text-sm text-gray-500">${l.district} | ${l.role}</div>
                </div>
              </div>
              <div class="grid grid-cols-2 gap-3 mb-3">
                <div class="bg-gray-50 rounded-lg p-3">
                  <div class="text-xs text-gray-400">학력</div>
                  <div class="text-sm text-gray-700 mt-0.5">${l.education}</div>
                </div>
                <div class="bg-gray-50 rounded-lg p-3">
                  <div class="text-xs text-gray-400">경력</div>
                  <div class="text-sm text-gray-700 mt-0.5">${l.career}</div>
                </div>
              </div>
              <div class="text-sm text-gray-500">이 이슈 관련 발의 법안: <span class="font-bold text-gray-900">${l.bills}건</span></div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

renderIssues();
</script>
</body>
</html>
