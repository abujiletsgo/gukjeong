function generateHeatmapData(bills) {
  const data = [];
  const today = new Date(2026, 2, 26);
  const oneYearAgo = new Date(2025, 2, 26);
  const dayMs = 86400000;
  const totalDays = Math.floor((today - oneYearAgo) / dayMs);

  // Generate activity based on bill count (more bills = more active days)
  const activityRate = Math.min(bills / 50, 0.8);
  const seed = bills * 7 + bills;

  for (let i = 0; i < totalDays; i++) {
    const date = new Date(oneYearAgo.getTime() + i * dayMs);
    const dayOfWeek = date.getDay();

    // No weekend activity (mostly)
    if (dayOfWeek === 0 || dayOfWeek === 6) {
      data.push({ date, count: Math.random() < 0.1 ? 1 : 0 });
      continue;
    }

    // Pseudo-random based on position
    const pseudoRand = Math.sin(seed + i * 0.7) * 0.5 + 0.5;
    if (pseudoRand < activityRate) {
      const intensity = Math.floor(pseudoRand * 7) + 1;
      data.push({ date, count: Math.min(intensity, 6) });
    } else {
      data.push({ date, count: 0 });
    }
  }
  return data;
}

function getHeatColor(count) {
  if (count === 0) return 'bg-gray-200';
  if (count <= 2) return 'bg-green-200';
  if (count <= 4) return 'bg-green-400';
  return 'bg-green-600';
}

function renderHeatmap(data) {
  const weeks = [];
  let currentWeek = [];

  // Pad start
  const startDay = data[0].date.getDay();
  for (let i = 0; i < startDay; i++) {
    currentWeek.push(null);
  }

  data.forEach(d => {
    currentWeek.push(d);
    if (currentWeek.length === 7) {
      weeks.push(currentWeek);
      currentWeek = [];
    }
  });
  if (currentWeek.length > 0) weeks.push(currentWeek);

  const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  let html = '<div class="overflow-x-auto"><div class="inline-flex gap-[2px]">';
  weeks.forEach((week, wi) => {
    html += '<div class="flex flex-col gap-[2px]">';
    week.forEach(day => {
      if (day === null) {
        html += '<div class="heatmap-cell"></div>';
      } else {
        const dateStr = `${day.date.getFullYear()}-${String(day.date.getMonth()+1).padStart(2,'0')}-${String(day.date.getDate()).padStart(2,'0')}`;
        const label = day.count > 0 ? `${dateStr}: ${day.count}건 활동` : `${dateStr}: 활동 없음`;
        html += `<div class="heatmap-cell ${getHeatColor(day.count)}" title="${label}"></div>`;
      }
    });
    html += '</div>';
  });
  html += '</div></div>';
  return html;
}
