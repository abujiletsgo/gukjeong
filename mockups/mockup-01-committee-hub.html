function renderCommittees() {
  const grid = document.getElementById('committee-grid');
  grid.innerHTML = committees.map((c, i) => `
    <div class="committee-card bg-white rounded-xl border border-gray-200 p-6 cursor-pointer hover:shadow-lg transition-all duration-200" onclick="showDetail(${i})">
      <div class="flex items-start justify-between mb-4">
        <span class="text-3xl">${c.icon}</span>
        <div class="text-right">
          <div class="text-2xl font-bold text-gray-900">${c.billCount}</div>
          <div class="text-xs text-gray-400">발의 법안</div>
        </div>
      </div>
      <h3 class="text-lg font-bold text-gray-900 mb-1">${c.name}</h3>
      <p class="text-sm text-gray-500 mb-4">${c.desc}</p>
      <div class="flex items-center justify-between">
        <span class="text-xs text-amber-600 bg-amber-50 px-2 py-1 rounded-full">계류 ${c.pendingBills}건</span>
        <span class="text-xs text-gray-400">${c.members.length > 0 ? c.members.length + '명 등록' : ''}</span>
      </div>
    </div>
  `).join('');
}

function showCommittees() {
  document.getElementById('view-committees').classList.remove('hidden');
  document.getElementById('view-detail').classList.add('hidden');
  document.getElementById('view-member').classList.add('hidden');
  document.getElementById('breadcrumb').innerHTML = '<span class="font-medium text-gray-900">전체 위원회</span>';
  currentCommittee = null;
}

function showDetail(idx) {
  currentCommittee = idx;
  const c = committees[idx];
  document.getElementById('view-committees').classList.add('hidden');
  document.getElementById('view-detail').classList.remove('hidden');
  document.getElementById('view-member').classList.add('hidden');
  document.getElementById('breadcrumb').innerHTML = `
    <span class="cursor-pointer hover:text-gray-900" onclick="showCommittees()">전체 위원회</span>
    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
    <span class="font-medium text-gray-900">${c.name}</span>
  `;

  const content = document.getElementById('detail-content');
  content.innerHTML = `
    <div class="fade-in">
      <div class="bg-white rounded-xl border border-gray-200 p-8 mb-6">
        <div class="flex items-center gap-4 mb-4">
          <span class="text-4xl">${c.icon}</span>
          <div>
            <h2 class="text-2xl font-bold text-gray-900">${c.name}</h2>
            <p class="text-gray-500">${c.desc}</p>
          </div>
        </div>
        <div class="grid grid-cols-3 gap-4 mt-6">
          <div class="bg-gray-50 rounded-lg p-4 text-center">
            <div class="text-3xl font-bold text-gray-900">${c.billCount}</div>
            <div class="text-sm text-gray-500">발의 법안</div>
          </div>
          <div class="bg-amber-50 rounded-lg p-4 text-center">
            <div class="text-3xl font-bold text-amber-600">${c.pendingBills}</div>
            <div class="text-sm text-gray-500">계류 중</div>
          </div>
          <div class="bg-green-50 rounded-lg p-4 text-center">
            <div class="text-3xl font-bold text-green-600">${c.billCount - c.pendingBills}</div>
            <div class="text-sm text-gray-500">처리 완료</div>
          </div>
        </div>
      </div>

      ${c.keyBills.length > 0 ? `
      <div class="mb-6">
        <h3 class="text-lg font-bold text-gray-900 mb-3">주요 심사 법안</h3>
        <div class="space-y-3">
          ${c.keyBills.map(b => `
            <div class="bg-white rounded-lg border border-gray-200 p-4">
              <div class="font-semibold text-gray-900 mb-1">${b.name}</div>
              <div class="text-sm text-gray-500">${b.summary}</div>
            </div>
          `).join('')}
        </div>
      </div>
      ` : ''}

      <div>
        <h3 class="text-lg font-bold text-gray-900 mb-3">소속 위원</h3>
        ${c.members.length > 0 ? `
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          ${c.members.map((m, mi) => `

              <div class="flex items-center gap-4">

                    <span class="font-bold text-gray-900">${m.name}</span>
                    <span class="text-xs px-2 py-0.5 rounded-full ${m.party === '더불어민주당' ? 'bg-blue-50 text-blue-700' : 'bg-red-50 text-red-700'}">${m.party}</span>
                  </div>
                  <div class="text-sm text-gray-500">${m.district}</div>
                </div>
                <div class="text-right">
                  <div class="text-lg font-bold text-gray-900">${m.bills}</div>
                  <div class="text-xs text-gray-400">발의</div>
                </div>
              </div>
              <div class="mt-3 flex items-center gap-2">
                <div class="flex-1 bg-gray-100 rounded-full h-2">
                  <div class="h-2 rounded-full ${m.participation >= 90 ? 'bg-green-500' : m.participation >= 80 ? 'bg-yellow-500' : 'bg-red-500'}" style="width: ${m.participation}%"></div>
                </div>
                <span class="text-xs text-gray-500">출석 ${m.participation}%</span>
              </div>
            </div>
          `).join('')}
        </div>
        ` : '<p class="text-gray-400 bg-white rounded-lg border border-gray-200 p-8 text-center">이 위원회의 상세 위원 데이터를 준비 중입니다</p>'}
      </div>
    </div>
  `;
}

  const c = committees[cIdx];
  const m = c.members[mIdx];
  document.getElementById('view-detail').classList.add('hidden');
  document.getElementById('view-member').classList.remove('hidden');
  document.getElementById('breadcrumb').innerHTML = `
    <span class="cursor-pointer hover:text-gray-900" onclick="showCommittees()">전체</span>
    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
    <span class="cursor-pointer hover:text-gray-900" onclick="showDetail(${cIdx})">${c.name}</span>
    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
    <span class="font-medium text-gray-900">${m.name}</span>
  `;

  const content = document.getElementById('member-content');
  content.innerHTML = `
    <div class="fade-in">
      <div class="bg-white rounded-xl border border-gray-200 p-8 mb-6">
        <div class="flex items-center gap-6">
          <div class="w-20 h-20 rounded-full ${m.party === '더불어민주당' ? 'bg-blue-100' : 'bg-red-100'} flex items-center justify-center text-3xl font-bold ${m.party === '더불어민주당' ? 'text-blue-700' : 'text-red-700'}">
            ${m.name[0]}
          </div>
          <div>
            <h2 class="text-2xl font-bold text-gray-900">${m.name} 의원</h2>
            <div class="flex items-center gap-2 mt-1">
              <span class="text-sm px-3 py-1 rounded-full ${m.party === '더불어민주당' ? 'bg-blue-50 text-blue-700' : 'bg-red-50 text-red-700'}">${m.party}</span>
              <span class="text-sm text-gray-500">${m.district}</span>
            </div>
          </div>
        </div>
        <div class="mt-6 grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="bg-gray-50 rounded-lg p-4">
            <div class="text-xs text-gray-400 mb-1">학력</div>
            <div class="text-sm text-gray-700">${m.education}</div>
          </div>
          <div class="bg-gray-50 rounded-lg p-4">
            <div class="text-xs text-gray-400 mb-1">경력</div>
            <div class="text-sm text-gray-700">${m.career}</div>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4 mt-4">
          <div class="bg-gray-50 rounded-lg p-4 text-center">
            <div class="text-2xl font-bold text-gray-900">${m.bills}</div>
            <div class="text-sm text-gray-500">발의 법안</div>
          </div>
          <div class="bg-gray-50 rounded-lg p-4 text-center">
            <div class="text-2xl font-bold ${m.participation >= 90 ? 'text-green-600' : m.participation >= 80 ? 'text-yellow-600' : 'text-red-600'}">${m.participation}%</div>
            <div class="text-sm text-gray-500">본회의 출석률</div>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-xl border border-gray-200 p-6">
        <h3 class="font-bold text-gray-900 mb-4">${c.name}에서의 활동</h3>
        <div class="space-y-3">
          ${c.keyBills.map(b => `
            <div class="border border-gray-100 rounded-lg p-4">
              <div class="font-medium text-gray-900">${b.name}</div>
              <div class="text-sm text-gray-500 mt-1">${b.summary}</div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
}

renderCommittees();
</script>
</body>
</html>
